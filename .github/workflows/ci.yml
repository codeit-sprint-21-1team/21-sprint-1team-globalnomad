name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # 성공 시 Discord 알림
      - name: Discord Notify (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ CI 성공 - PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Discord Notify (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ CI 실패 - PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
